<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ember field — a million particles</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  #hint {
    position: fixed; bottom: 12px; left: 14px;
    font: 12px/1.4 ui-monospace, monospace; color: rgba(255,255,255,.45);
    user-select: none; pointer-events: none;
    transition: opacity 2s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">1,048,576 particles &middot; the mouse is a vortex &middot; no geometry is ever uploaded &mdash; positions live in a texture the GPU updates itself</div>

<!-- ============================================================
     STATE UPDATE — one texel per particle (1024×1024 = 2^20).
     xy = position, zw = velocity. Each frame: accelerate along a
     drifting curl-noise field, apply drag, integrate, wrap.
     A small fraction of particles respawns every frame so the
     field never fully collapses onto its attractors.
============================================================ -->
<script type="x-shader/fragment" id="sim-fs">#version 300 es
precision highp float;

uniform sampler2D uState;
uniform vec2  uScreen;   // for aspect
uniform float uTime;
uniform vec2  uMouse;    // uv
uniform float uMouseOn;
uniform float uReset;

out vec4 outState;

// ---- tweak these ------------------------------------------------
const float FIELD_SCALE = 1.3;     // swirl size
const float ACCEL       = 0.00040; // how hard the field pushes
const float DRAG        = 0.80;    // low inertia — hug the field's filaments
const float DRIFT       = 0.05;    // field evolution speed
const float RESPAWN     = 0.004;   // fraction reborn per frame
const float GATHER      = 0.85;    // 0 = pure swirl (uniform), 1 = pure gather (clumps)
// -----------------------------------------------------------------

float hash(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1, 0)), f.x),
             mix(hash(i + vec2(0, 1)), hash(i + vec2(1, 1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
  for (int i = 0; i < 4; i++) { v += a * noise(p); p = rot * p * 2.0; a *= 0.5; }
  return v;
}
vec2 curl(vec2 p) {
  float e = 0.02;
  float dy = fbm(p + vec2(0, e)) - fbm(p - vec2(0, e));
  float dx = fbm(p + vec2(e, 0)) - fbm(p - vec2(e, 0));
  return vec2(dy, -dx) / (2.0 * e);
}

void main() {
  ivec2 ij = ivec2(gl_FragCoord.xy);
  vec2 id = gl_FragCoord.xy;

  if (uReset > 0.5) {
    outState = vec4(hash(id * 0.013), hash(id * 0.017 + 4.2), 0.0, 0.0);
    return;
  }

  vec4 s = texelFetch(uState, ij, 0);
  vec2 p = s.xy, v = s.zw;
  vec2 asp = vec2(uScreen.x / uScreen.y, 1.0);

  // curl alone is divergence-free — particles would stay uniformly spread
  // forever. Mixing in an angle field (NOT divergence-free) lets them
  // converge into filaments, which is where the silk comes from.
  vec2 q = p * asp * FIELD_SCALE + vec2(uTime * DRIFT, -uTime * DRIFT * 0.6);
  float ang = fbm(q) * 18.85;   // more winding → more convergence filaments
  v += mix(curl(q), vec2(cos(ang), sin(ang)) * 1.6, GATHER) * ACCEL;

  // mouse vortex: tangential swirl plus a gentle pull inward
  vec2 d = (p - uMouse) * asp;
  float r2 = dot(d, d);
  vec2 swirl = normalize(vec2(-d.y, d.x) + 1e-6);
  v += (swirl * 1.4 - normalize(d + 1e-6) * 0.5) * exp(-r2 * 30.0) * uMouseOn * 0.0022;

  v *= DRAG;
  p = fract(p + v);

  // occasional rebirth, keyed off position so it isn't frame-locked
  if (hash(id * 0.011 + fract(uTime) * 3.7) < RESPAWN) {
    p = vec2(hash(id + uTime), hash(id * 1.7 - uTime));
    v = vec2(0.0);
  }

  outState = vec4(p, v);
}
</script>

<!-- ============================================================
     PARTICLE DRAW — no vertex buffer. gl_VertexID indexes the
     state texture; each particle becomes one additive glowing dot,
     colored by its speed.
============================================================ -->
<script type="x-shader/vertex" id="pt-vs">#version 300 es
precision highp float;
uniform sampler2D uState;
uniform float uPointSize;
uniform float uTime;
out vec3 vColor;

vec3 palette(float t) {
  return 0.5 + 0.5 * cos(6.28318 * (vec3(0.95, 1.0, 1.05) * t + vec3(0.0, 0.25, 0.55)));
}

void main() {
  ivec2 ij = ivec2(gl_VertexID % 1024, gl_VertexID / 1024);
  vec4 s = texelFetch(uState, ij, 0);
  gl_Position = vec4(s.xy * 2.0 - 1.0, 0.0, 1.0);
  gl_PointSize = uPointSize;
  // hue drifts across space; speed only sets brightness — filaments read
  // as continuous strokes instead of confetti
  float speed = length(s.zw);
  vColor = palette(s.x * 0.7 + s.y * 0.4 + uTime * 0.012) * (0.3 + speed * 420.0);
}
</script>
<script type="x-shader/fragment" id="pt-fs">#version 300 es
precision highp float;
in vec3 vColor;
out vec4 outColor;
void main() {
  float d = length(gl_PointCoord - 0.5);
  float a = smoothstep(0.5, 0.0, d);
  outColor = vec4(vColor * a * 0.032, 1.0);
}
</script>

<!-- trail fade: copy last frame's glow, dimmed -->
<script type="x-shader/fragment" id="fade-fs">#version 300 es
precision highp float;
uniform sampler2D uTrail;
uniform vec2 uRes;
out vec4 outColor;
void main() {
  vec3 c = texture(uTrail, gl_FragCoord.xy / uRes).rgb;
  outColor = vec4(c * 0.985, 1.0);
}
</script>

<!-- present: tone-map the accumulated light -->
<script type="x-shader/fragment" id="show-fs">#version 300 es
precision highp float;
uniform sampler2D uTrail;
uniform vec2 uRes;
out vec4 outColor;
void main() {
  vec2 uv = gl_FragCoord.xy / uRes;
  vec3 c = texture(uTrail, uv).rgb;
  c = 1.0 - exp(-c * 2.4);
  float v = length(uv - 0.5);
  c *= 1.0 - 0.4 * v * v;
  outColor = vec4(pow(c, vec3(0.4545)), 1.0);
}
</script>

<script type="x-shader/vertex" id="quad-vs">#version 300 es
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
</script>

<script>
const N_SIDE = 1024;                       // 1024² = 1,048,576 particles
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;font-family:monospace;padding:2em">WebGL2 not available</p>'; throw new Error('no webgl2'); }
const canFloat = !!gl.getExtension('EXT_color_buffer_float');

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src.trim());
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function program(vsId, fsId) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, document.getElementById(vsId).textContent));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, document.getElementById(fsId).textContent));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}
const simProg  = program('quad-vs', 'sim-fs');
const ptProg   = program('pt-vs', 'pt-fs');
const fadeProg = program('quad-vs', 'fade-fs');
const showProg = program('quad-vs', 'show-fs');

// fullscreen triangle VAO (also used, attribute-less, for points)
const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
const emptyVao = gl.createVertexArray();   // points: gl_VertexID does all the work

function makeTex(w, h, prec32) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  if (canFloat && prec32) gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, w, h, 0, gl.RGBA, gl.FLOAT, null);
  else if (canFloat)      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  else                    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  return { tex, fbo };
}

// particle state: full 32-bit float — positions quantize visibly at 16-bit
const state = [makeTex(N_SIDE, N_SIDE, true), makeTex(N_SIDE, N_SIDE, true)];
let sRead = 0, needReset = true;

let W = 0, H = 0, trail = null, tRead = 0;
function resize() {
  const dpr = Math.min(devicePixelRatio || 1, 1.5);
  W = Math.floor(innerWidth * dpr);
  H = Math.floor(innerHeight * dpr);
  canvas.width = W; canvas.height = H;
  trail = [makeTex(W, H, false), makeTex(W, H, false)];
}
addEventListener('resize', resize);
resize();

const mouse = { x: -10, y: -10, on: 0 };
function point(x, y) { mouse.x = x / innerWidth; mouse.y = 1 - y / innerHeight; mouse.on = 1; }
addEventListener('mousemove', e => point(e.clientX, e.clientY));
addEventListener('mouseleave', () => { mouse.on = 0; });
addEventListener('touchmove', e => { point(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
addEventListener('touchend', () => { mouse.on = 0; });

const simU  = ['uState', 'uScreen', 'uTime', 'uMouse', 'uMouseOn', 'uReset']
  .reduce((o, k) => (o[k] = gl.getUniformLocation(simProg, k), o), {});
const ptU   = ['uState', 'uPointSize', 'uTime']
  .reduce((o, k) => (o[k] = gl.getUniformLocation(ptProg, k), o), {});
const fadeU = ['uTrail', 'uRes'].reduce((o, k) => (o[k] = gl.getUniformLocation(fadeProg, k), o), {});
const showU = ['uTrail', 'uRes'].reduce((o, k) => (o[k] = gl.getUniformLocation(showProg, k), o), {});

let simT = 0, lastNow = 0;
const DT = 1 / 60;   // simulation runs on its own clock, one tick per frame

function step(dt) {
  simT += dt;
  const t = simT;

  // 1. advance particle state
  gl.bindVertexArray(vao);
  gl.bindFramebuffer(gl.FRAMEBUFFER, state[1 - sRead].fbo);
  gl.viewport(0, 0, N_SIDE, N_SIDE);
  gl.useProgram(simProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, state[sRead].tex);
  gl.uniform1i(simU.uState, 0);
  gl.uniform2f(simU.uScreen, W, H);
  gl.uniform1f(simU.uTime, t);
  gl.uniform2f(simU.uMouse, mouse.x, mouse.y);
  gl.uniform1f(simU.uMouseOn, mouse.on);
  gl.uniform1f(simU.uReset, needReset ? 1 : 0);
  needReset = false;
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  sRead = 1 - sRead;

  // 2. fade last frame's trails into the other trail buffer
  gl.bindFramebuffer(gl.FRAMEBUFFER, trail[1 - tRead].fbo);
  gl.viewport(0, 0, W, H);
  gl.useProgram(fadeProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, trail[tRead].tex);
  gl.uniform1i(fadeU.uTrail, 0);
  gl.uniform2f(fadeU.uRes, W, H);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  // 3. splat all million particles on top, additively
  gl.useProgram(ptProg);
  gl.bindVertexArray(emptyVao);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, state[sRead].tex);
  gl.uniform1i(ptU.uState, 0);
  gl.uniform1f(ptU.uPointSize, Math.max(1.5, W / 1400));
  gl.uniform1f(ptU.uTime, t);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE);
  gl.drawArrays(gl.POINTS, 0, N_SIDE * N_SIDE);
  gl.disable(gl.BLEND);
  tRead = 1 - tRead;
}

function render() {
  // 4. tone-map to screen
  gl.bindVertexArray(vao);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.useProgram(showProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, trail[tRead].tex);
  gl.uniform1i(showU.uTrail, 0);
  gl.uniform2f(showU.uRes, W, H);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

// ?warp=N pre-runs N frames before first paint — headless capture
// can't fast-forward requestAnimationFrame, so the piece does it itself
const warp = Math.min(20000, parseInt(new URLSearchParams(location.search).get('warp'), 10) || 0);
for (let i = 0; i < warp; i++) step(DT);

function frame(now) {
  const dt = lastNow ? Math.min((now - lastNow) / 1000, 0.05) : DT;
  lastNow = now;
  step(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

if (window.self !== window.top) document.getElementById('hint').remove();
else setTimeout(() => { document.getElementById('hint').style.opacity = 0; }, 12000);
</script>
</body>
</html>
