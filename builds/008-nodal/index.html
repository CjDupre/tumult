<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>nodal — the sand gathers where the plate is still</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  #hint {
    position: fixed; bottom: 12px; left: 14px;
    font: 12px/1.4 ui-monospace, monospace; color: rgba(255,255,255,.45);
    user-select: none; pointer-events: none;
    transition: opacity 2s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">1,048,576 grains of sand on a singing plate &middot; click once and it listens to your room; untouched, it sings to itself &middot; the sand gathers where the plate is still</div>

<!-- ============================================================
     CHLADNI PLATE. The plate vibrates as a superposition of six
     standing-wave modes u_i = cos(mπx)cos(nπy) − cos(nπx)cos(mπy).
     Sand is overdamped: each grain random-walks with step size
     proportional to |u| (the plate throws it) and slides down
     −∇(u²) (toward stillness). Figures are never drawn — they are
     where the shaking stops. Mode amplitudes come from a live
     microphone FFT (six log-spaced bands), or from an internal
     score when no one has clicked. Sound in, geometry out.
============================================================ -->
<script type="x-shader/fragment" id="sim-fs">#version 300 es
precision highp float;

uniform sampler2D uState;
uniform float uAmps[6];
uniform float uTime;
uniform float uReset;
uniform vec2  uMouse;
uniform float uMouseOn;
out vec4 outState;

// ---- tweak these ------------------------------------------------
const float SLIDE  = 0.00055;  // pull toward nodal lines
const float SHAKE  = 0.0045;   // how hard the plate throws sand
const float FLOOR  = 0.00018;  // tiny idle tremor — sand never dies
// -----------------------------------------------------------------

const vec2 MODES[6] = vec2[6](
  vec2(1.0, 2.0), vec2(2.0, 3.0), vec2(1.0, 4.0),
  vec2(3.0, 4.0), vec2(2.0, 5.0), vec2(3.0, 6.0)
);

float hash1(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}

// plate displacement and its gradient, in one pass over the modes
vec3 plate(vec2 p) {   // returns (u, du/dx, du/dy)
  vec3 s = vec3(0.0);
  const float PI = 3.14159265;
  for (int i = 0; i < 6; i++) {
    float m = MODES[i].x * PI, n = MODES[i].y * PI;
    float cmx = cos(m * p.x), cnx = cos(n * p.x);
    float cmy = cos(m * p.y), cny = cos(n * p.y);
    float u  = cmx * cny - cnx * cmy;
    vec2  g  = vec2(-m * sin(m * p.x) * cny + n * sin(n * p.x) * cmy,
                    -n * sin(n * p.y) * cmx + m * sin(m * p.y) * cnx);
    s += uAmps[i] * vec3(u, g);
  }
  return s;
}

void main() {
  vec2 id = gl_FragCoord.xy;

  if (uReset > 0.5) {
    outState = vec4(hash1(id * 0.013), hash1(id * 0.017 + 4.2), hash1(id * 0.023 + 9.7), 0.0);
    return;
  }

  vec4 s = texelFetch(uState, ivec2(id), 0);
  vec2 p = s.xy;

  vec3 pl = plate(p);
  float u = pl.x;

  // overdamped sand: slide toward stillness, get thrown where it shakes
  vec2 slide = -u * pl.yz * SLIDE;

  float a = hash1(id + fract(uTime) * vec2(3.7, 7.9)) * 6.28318;
  float tremor = abs(u) * SHAKE + FLOOR;
  // a fingertip on the plate rattles the sand around it
  tremor += exp(-dot(p - uMouse, p - uMouse) / 0.004) * uMouseOn * 0.004;
  vec2 shake = vec2(cos(a), sin(a)) * tremor * hash1(id * 1.7 - fract(uTime * 0.71) * 5.3);

  p = clamp(p + slide + shake, 0.003, 0.997);

  outState = vec4(p, s.z, abs(u));   // remember |u| for the renderer
}
</script>

<!-- ============================================================
     DRAW — attribute-less points. Settled grains (low |u|) burn
     bright: the figure is made of the calmest sand. Restless
     grains are dim ember dust between the lines.
============================================================ -->
<script type="x-shader/vertex" id="pt-vs">#version 300 es
precision highp float;
uniform sampler2D uState;
uniform float uPointSize;
out vec3 vColor;
void main() {
  vec4 s = texelFetch(uState, ivec2(gl_VertexID % 1024, gl_VertexID / 1024), 0);
  gl_Position = vec4(s.xy * 2.0 - 1.0, 0.0, 1.0);
  gl_PointSize = uPointSize;
  float settle = exp(-s.w * 2.6);          // 1 on nodal lines, →0 where loud
  vec3 lineGold = vec3(1.00, 0.86, 0.55);
  vec3 dust     = vec3(0.55, 0.33, 0.15);
  vColor = mix(dust, lineGold, settle) * (0.20 + 0.80 * settle)
         + vec3(0.03, 0.022, 0.013) * (0.7 + 0.6 * s.z);   // grain-to-grain variation
}
</script>
<script type="x-shader/fragment" id="pt-fs">#version 300 es
precision highp float;
in vec3 vColor;
out vec4 outColor;
void main() {
  float d = length(gl_PointCoord - 0.5);
  float a = smoothstep(0.5, 0.0, d);
  outColor = vec4(vColor * a * 0.16, 1.0);
}
</script>

<!-- short-memory trails: the figure re-forms live, so the glow is
     an afterimage, not an archive -->
<script type="x-shader/fragment" id="fade-fs">#version 300 es
precision highp float;
uniform sampler2D uTrail;
uniform vec2 uRes;
out vec4 outColor;
void main() {
  vec3 c = texture(uTrail, gl_FragCoord.xy / uRes).rgb;
  outColor = vec4(c * 0.88, 1.0);
}
</script>

<!-- present: the plate itself shimmers faintly where it moves —
     the invisible cause behind the visible figure -->
<script type="x-shader/fragment" id="show-fs">#version 300 es
precision highp float;
uniform sampler2D uTrail;
uniform vec2 uRes;
uniform float uAmps[6];
uniform float uTime;
out vec4 outColor;

const vec2 MODES[6] = vec2[6](
  vec2(1.0, 2.0), vec2(2.0, 3.0), vec2(1.0, 4.0),
  vec2(3.0, 4.0), vec2(2.0, 5.0), vec2(3.0, 6.0)
);

float plateU(vec2 p) {
  float s = 0.0;
  const float PI = 3.14159265;
  for (int i = 0; i < 6; i++) {
    float m = MODES[i].x * PI, n = MODES[i].y * PI;
    s += uAmps[i] * (cos(m * p.x) * cos(n * p.y) - cos(n * p.x) * cos(m * p.y));
  }
  return s;
}

void main() {
  vec2 uv = gl_FragCoord.xy / uRes;
  vec3 c = texture(uTrail, uv).rgb;

  // antinode shimmer — the plate's motion, breathing at audio-ish rate
  float u = plateU(uv);
  float ring = abs(u) * (0.55 + 0.45 * sin(uTime * 37.0));
  c += vec3(0.020, 0.045, 0.075) * ring * 0.55;

  c = 1.0 - exp(-c * 2.1);
  float v = length(uv - 0.5);
  c *= 1.0 - 0.45 * v * v;
  outColor = vec4(pow(c, vec3(0.4545)), 1.0);
}
</script>

<script type="x-shader/vertex" id="quad-vs">#version 300 es
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
</script>

<script>
const N_SIDE = 1024;                       // 1024² = 1,048,576 grains
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false });
const canFloat = gl && gl.getExtension('EXT_color_buffer_float');
if (!gl || !canFloat) { document.body.innerHTML = '<p style="color:#fff;font-family:monospace;padding:2em">needs WebGL2 + float render targets</p>'; throw new Error('no webgl2/float'); }

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src.trim());
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function program(vsId, fsId) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, document.getElementById(vsId).textContent));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, document.getElementById(fsId).textContent));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}
const simProg  = program('quad-vs', 'sim-fs');
const ptProg   = program('pt-vs', 'pt-fs');
const fadeProg = program('quad-vs', 'fade-fs');
const showProg = program('quad-vs', 'show-fs');

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
const emptyVao = gl.createVertexArray();

function makeTex(w, h, fmt, filter) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texStorage2D(gl.TEXTURE_2D, 1, fmt, w, h);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  return { tex, fbo };
}

const state = [makeTex(N_SIDE, N_SIDE, gl.RGBA32F, gl.NEAREST), makeTex(N_SIDE, N_SIDE, gl.RGBA32F, gl.NEAREST)];
let sRead = 0, needReset = true;

let W = 0, H = 0, trail = null, tRead = 0;
function resize() {
  const dpr = Math.min(devicePixelRatio || 1, 1.5);
  W = Math.floor(innerWidth * dpr);
  H = Math.floor(innerHeight * dpr);
  canvas.width = W; canvas.height = H;
  trail = [makeTex(W, H, gl.RGBA16F, gl.LINEAR), makeTex(W, H, gl.RGBA16F, gl.LINEAR)];
}
addEventListener('resize', resize);
resize();

const mouse = { x: -9, y: -9, on: 0 };
addEventListener('pointermove', e => {
  mouse.x = e.clientX / innerWidth;
  mouse.y = 1 - e.clientY / innerHeight;
  mouse.on = 1;
});
addEventListener('pointerleave', () => { mouse.on = 0; });

// ---- the data: six mode amplitudes ------------------------------
// With a mic: six log-spaced FFT bands (~80 Hz – 6 kHz), so bass
// rings the coarse figures and treble the fine ones. Without: an
// internal score walks the modes deterministically (warp-safe).
let analyser = null, freq = null, nyquist = 24000;
const amps = new Float32Array(6);
addEventListener('pointerdown', async () => {
  if (analyser) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ac = new AudioContext();
    nyquist = ac.sampleRate / 2;
    const src = ac.createMediaStreamSource(stream);
    analyser = ac.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.6;
    src.connect(analyser);
    freq = new Uint8Array(analyser.frequencyBinCount);
    document.getElementById('hint')?.remove();
  } catch (e) { /* denied — the score keeps singing */ }
});

function bump(x) {   // narrow smooth solo peak, once per unit
  x = x - Math.floor(x);
  return Math.pow(Math.max(0, Math.sin(x * Math.PI)), 6);
}

function updateAmps(t) {
  if (analyser) {
    analyser.getByteFrequencyData(freq);
    const n = freq.length, nyq = nyquist;
    // six log-spaced bands, 80 Hz → 6 kHz
    for (let b = 0; b < 6; b++) {
      const f0 = 80 * Math.pow(6000 / 80, b / 6), f1 = 80 * Math.pow(6000 / 80, (b + 1) / 6);
      const i0 = Math.max(1, Math.floor(f0 / nyq * n)), i1 = Math.min(n, Math.ceil(f1 / nyq * n));
      let e = 0;
      for (let i = i0; i < i1; i++) e = Math.max(e, freq[i]);
      const target = Math.pow(e / 255, 1.8) * 1.15;
      amps[b] = Math.max(target, amps[b] * 0.94);    // fast attack, slow release
    }
  } else {
    // the score: each mode takes ~9s solos, staggered so usually one
    // leads and a second hums under it; a slow global swell breathes
    const swell = 0.75 + 0.25 * Math.sin(t * 0.05);
    for (let b = 0; b < 6; b++) {
      amps[b] = bump(t / 54 + b / 6) * 0.9 * swell;
    }
  }
}

const loc = (p, k) => gl.getUniformLocation(p, k) ?? gl.getUniformLocation(p, k + '[0]');
const simU  = ['uState', 'uAmps', 'uTime', 'uReset', 'uMouse', 'uMouseOn']
  .reduce((o, k) => (o[k] = loc(simProg, k), o), {});
const ptU   = ['uState', 'uPointSize'].reduce((o, k) => (o[k] = loc(ptProg, k), o), {});
const fadeU = ['uTrail', 'uRes'].reduce((o, k) => (o[k] = loc(fadeProg, k), o), {});
const showU = ['uTrail', 'uRes', 'uAmps', 'uTime'].reduce((o, k) => (o[k] = loc(showProg, k), o), {});

let simT = 0;
const DT = 1 / 60;

function step() {
  simT += DT;
  updateAmps(simT);

  // 1. move the sand
  gl.bindVertexArray(vao);
  gl.bindFramebuffer(gl.FRAMEBUFFER, state[1 - sRead].fbo);
  gl.viewport(0, 0, N_SIDE, N_SIDE);
  gl.useProgram(simProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, state[sRead].tex);
  gl.uniform1i(simU.uState, 0);
  gl.uniform1fv(simU.uAmps, amps);
  gl.uniform1f(simU.uTime, simT);
  gl.uniform1f(simU.uReset, needReset ? 1 : 0);
  gl.uniform2f(simU.uMouse, mouse.x, mouse.y);
  gl.uniform1f(simU.uMouseOn, mouse.on);
  needReset = false;
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  sRead = 1 - sRead;

  // 2. fade the afterimage
  gl.bindFramebuffer(gl.FRAMEBUFFER, trail[1 - tRead].fbo);
  gl.viewport(0, 0, W, H);
  gl.useProgram(fadeProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, trail[tRead].tex);
  gl.uniform1i(fadeU.uTrail, 0);
  gl.uniform2f(fadeU.uRes, W, H);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  // 3. splat the grains
  gl.useProgram(ptProg);
  gl.bindVertexArray(emptyVao);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, state[sRead].tex);
  gl.uniform1i(ptU.uState, 0);
  gl.uniform1f(ptU.uPointSize, Math.max(1.5, W / 1300));
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE);
  gl.drawArrays(gl.POINTS, 0, N_SIDE * N_SIDE);
  gl.disable(gl.BLEND);
  tRead = 1 - tRead;
}

function render() {
  gl.bindVertexArray(vao);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.useProgram(showProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, trail[tRead].tex);
  gl.uniform1i(showU.uTrail, 0);
  gl.uniform2f(showU.uRes, W, H);
  gl.uniform1fv(showU.uAmps, amps);
  gl.uniform1f(showU.uTime, simT);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

// ?warp=N pre-runs N frames before first paint — headless capture
// can't fast-forward requestAnimationFrame, so the piece does it itself
const warp = Math.min(20000, parseInt(new URLSearchParams(location.search).get('warp'), 10) || 0);
for (let i = 0; i < warp; i++) step();

function frame() {
  step();
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

if (window.self !== window.top) document.getElementById('hint')?.remove();
else setTimeout(() => { const h = document.getElementById('hint'); if (h) h.style.opacity = 0; }, 12000);
</script>
</body>
</html>
