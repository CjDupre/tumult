<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>pupil — a neural network learns to see, live</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  #hint {
    position: fixed; bottom: 12px; left: 14px;
    font: 12px/1.4 ui-monospace, monospace; color: rgba(255,255,255,.45);
    user-select: none; pointer-events: none;
    transition: opacity 2s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">a 4,851-parameter neural network, training by backprop in this tab right now &middot; the image is its current belief &middot; the sparks are its training samples, bright where it is most wrong &middot; move to stir its world; click to show it your camera</div>

<!-- ============================================================
     PUPIL. An MLP — Fourier features → 32 → 32 → RGB — trained
     live by stochastic gradient descent, implemented entirely in
     fragment shaders: forward passes, backward deltas, weight
     updates, all of it. Each frame it is allowed 6 steps of 1,024
     random glimpses of a world it cannot see whole. What you
     watch is never the world — it is the network's current belief
     about the world, forever a few thousand gradients behind.
     The world drifts (and you can stir it), so it never catches
     up. Click, and the world becomes your camera.
============================================================ -->

<script type="x-shader/vertex" id="quad-vs">#version 300 es
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
</script>

<!-- shared: hash + the 16 fixed Fourier directions -->
<script type="x-shader/fragment" id="coord-fs">#version 300 es
precision highp float;
uniform float uStep;
out vec4 outC;
float hash1(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
void main() {
  float b = floor(gl_FragCoord.x);
  // fresh random glimpse coordinates every training step
  outC = vec4(hash1(vec2(b * 0.731 + 1.3, uStep * 0.917)),
              hash1(vec2(uStep * 0.613, b * 0.377 + 7.1)), 0.0, 0.0);
}
</script>

<script type="x-shader/fragment" id="h0-fs">#version 300 es
precision highp float;
uniform sampler2D uCoord;
out vec4 outC;
float hash1(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
void main() {
  int b = int(gl_FragCoord.x), j = int(gl_FragCoord.y);
  vec2 p = texelFetch(uCoord, ivec2(b, 0), 0).xy - 0.5;
  int k = j >> 1;
  float ang = hash1(vec2(float(k), 3.1)) * 6.2831853;
  float om  = 2.0 + hash1(vec2(float(k), 9.7)) * 17.0;
  float ph  = om * dot(vec2(cos(ang), sin(ang)), p);
  outC = vec4((j & 1) == 0 ? sin(ph) : cos(ph), 0.0, 0.0, 0.0);
}
</script>

<!-- dense layer forward: out[b,i] = tanh( Σ_j W[i,j]·in[b,j] + bias ) -->
<script type="x-shader/fragment" id="fwd-fs">#version 300 es
precision highp float;
uniform sampler2D uW, uIn;
uniform int uInN;
out vec4 outC;
void main() {
  int b = int(gl_FragCoord.x), i = int(gl_FragCoord.y);
  float z = texelFetch(uW, ivec2(uInN, i), 0).r;          // bias
  for (int j = 0; j < 48; j++) {
    if (j >= uInN) break;
    z += texelFetch(uW, ivec2(j, i), 0).r * texelFetch(uIn, ivec2(b, j), 0).r;
  }
  outC = vec4(tanh(z), 0.0, 0.0, 0.0);
}
</script>

<!-- output layer + delta: δ3[b,c] = (z3 − target_c), clamped -->
<script type="x-shader/fragment" id="d3-fs">#version 300 es
precision highp float;
uniform sampler2D uW3, uH2, uCoord, uCam;
uniform float uTime, uUseCam, uAspect, uCamAspect;
uniform vec2 uMouse;
out vec4 outC;

float hash1(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
float vnoise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash1(i), hash1(i + vec2(1, 0)), f.x),
             mix(hash1(i + vec2(0, 1)), hash1(i + vec2(1, 1)), f.x), f.y);
}
// the world, when no camera is offered: slow domain-warped ink,
// stirred by the pointer — the pupil must keep repainting it
vec3 world(vec2 uv) {
  vec2 p = (uv - 0.5) * vec2(uAspect, 1.0);
  vec2 m = (uMouse - 0.5) * vec2(uAspect, 1.0);
  vec2 d = p - m;
  p += normalize(vec2(-d.y, d.x) + 1e-4) * exp(-dot(d, d) * 14.0) * 0.25;
  float t = uTime * 0.05;
  vec2 w = vec2(vnoise(p * 2.3 + t), vnoise(p * 2.3 - t * 0.7 + 4.2));
  float n = vnoise(p * 3.1 + (w - 0.5) * 1.8 + vec2(t * 0.6, -t * 0.4));
  // house ink: deep blue-black through teal to pale gold — never rainbow
  vec3 c = vec3(0.24, 0.22, 0.25)
         + vec3(0.38, 0.33, 0.28) * cos(6.2831853 * (n * 0.9 + vec3(0.52, 0.38, 0.18)) + t * 0.3);
  return clamp(c * (0.35 + 0.9 * n), 0.0, 1.0);
}

void main() {
  int b = int(gl_FragCoord.x), c = int(gl_FragCoord.y);
  float z = texelFetch(uW3, ivec2(48, c), 0).r;
  for (int j = 0; j < 48; j++)
    z += texelFetch(uW3, ivec2(j, c), 0).r * texelFetch(uH2, ivec2(b, j), 0).r;
  vec2 uv = texelFetch(uCoord, ivec2(b, 0), 0).xy;
  vec3 tgt;
  if (uUseCam > 0.5) {
    // cover-crop the camera to the canvas aspect, mirrored
    vec2 q = uv - 0.5;
    vec2 cuv = (q * vec2(uAspect, 1.0) / max(1.0, uAspect / uCamAspect))
             / vec2(uCamAspect, 1.0) + 0.5;
    cuv.x = 1.0 - cuv.x;
    tgt = texture(uCam, cuv).rgb;
  } else {
    tgt = world(uv);
  }
  float t = c == 0 ? tgt.r : c == 1 ? tgt.g : tgt.b;
  outC = vec4(clamp(z - t, -4.0, 4.0), 0.0, 0.0, 0.0);
}
</script>

<!-- backward: δ[b,j] = (Σ_i Wnext[i,j]·δnext[b,i]) · (1 − h[b,j]²) -->
<script type="x-shader/fragment" id="back-fs">#version 300 es
precision highp float;
uniform sampler2D uWnext, uDnext, uH;
uniform int uNextN;
out vec4 outC;
void main() {
  int b = int(gl_FragCoord.x), j = int(gl_FragCoord.y);
  float s = 0.0;
  for (int i = 0; i < 48; i++) {
    if (i >= uNextN) break;
    s += texelFetch(uWnext, ivec2(j, i), 0).r * texelFetch(uDnext, ivec2(b, i), 0).r;
  }
  float h = texelFetch(uH, ivec2(b, j), 0).r;
  outC = vec4(clamp(s * (1.0 - h * h), -4.0, 4.0), 0.0, 0.0, 0.0);
}
</script>

<!-- Adam: per-weight adaptive steps. Plain SGD on a Fourier MLP
     learns the blobs in seconds and then crawls forever; Adam is
     what makes the details arrive. m and v ride along in a second
     render target — optimizer state is just more state-in-texture. -->
<script type="x-shader/fragment" id="sgd-fs">#version 300 es
precision highp float;
uniform sampler2D uW, uMV, uD, uA;
uniform int uInN;
uniform float uLR, uReset, uSeed, uScale, uT;
layout(location = 0) out vec4 outW;
layout(location = 1) out vec4 outMV;
float hash1(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
void main() {
  int j = int(gl_FragCoord.x), i = int(gl_FragCoord.y);
  if (uReset > 0.5) {
    outW = vec4((hash1(vec2(float(j) * 1.7 + 0.3, float(i) * 2.9 + uSeed)) - 0.5) * uScale, 0, 0, 0);
    outMV = vec4(0.0);
    return;
  }
  float g = 0.0;
  for (int b = 0; b < 1024; b++) {
    float a = j == uInN ? 1.0 : texelFetch(uA, ivec2(b, j), 0).r;
    g += texelFetch(uD, ivec2(b, i), 0).r * a;
  }
  g /= 1024.0;
  vec2 mv = texelFetch(uMV, ivec2(j, i), 0).rg;
  float m = mix(g,     mv.x, 0.9);
  float v = mix(g * g, mv.y, 0.999);
  float mh = m / (1.0 - pow(0.9,   uT));
  float vh = v / (1.0 - pow(0.999, uT));
  outW = vec4(texelFetch(uW, ivec2(j, i), 0).r - uLR * mh / (sqrt(vh) + 1e-8), 0, 0, 0);
  outMV = vec4(m, v, 0.0, 0.0);
}
</script>

<!-- smoothed display weights: SGD jitters at 360 steps/s, and raw
     weights strobe the belief. The eye gets an exponential moving
     average; the optimizer keeps its nerves to itself -->
<script type="x-shader/fragment" id="ema-fs">#version 300 es
precision highp float;
uniform sampler2D uWE, uW;
uniform float uInit;
out vec4 outC;
void main() {
  ivec2 q = ivec2(gl_FragCoord.xy);
  float w = texelFetch(uW, q, 0).r;
  float e = uInit > 0.5 ? w : mix(texelFetch(uWE, q, 0).r, w, 0.05);
  outC = vec4(e, 0.0, 0.0, 0.0);
}
</script>

<!-- display: run the whole network for every pixel — the belief -->
<script type="x-shader/fragment" id="disp-fs">#version 300 es
precision highp float;
uniform sampler2D uW1, uW2, uW3;
uniform vec2 uRes;
out vec4 outC;
float hash1(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
void main() {
  vec2 uv = gl_FragCoord.xy / uRes;
  vec2 p = uv - 0.5;

  float F[48]; float H1[48]; float H2[48];
  for (int j = 0; j < 48; j++) {
    int k = j >> 1;
    float ang = hash1(vec2(float(k), 3.1)) * 6.2831853;
    float om  = 2.0 + hash1(vec2(float(k), 9.7)) * 17.0;
    float ph  = om * dot(vec2(cos(ang), sin(ang)), p);
    F[j] = (j & 1) == 0 ? sin(ph) : cos(ph);
  }
  for (int i = 0; i < 48; i++) {
    float z = texelFetch(uW1, ivec2(48, i), 0).r;
    for (int j = 0; j < 48; j++) z += texelFetch(uW1, ivec2(j, i), 0).r * F[j];
    H1[i] = tanh(z);
  }
  for (int i = 0; i < 48; i++) {
    float z = texelFetch(uW2, ivec2(48, i), 0).r;
    for (int j = 0; j < 48; j++) z += texelFetch(uW2, ivec2(j, i), 0).r * H1[j];
    H2[i] = tanh(z);
  }
  vec3 col;
  for (int c = 0; c < 3; c++) {
    float z = texelFetch(uW3, ivec2(48, c), 0).r;
    for (int j = 0; j < 48; j++) z += texelFetch(uW3, ivec2(j, c), 0).r * H2[j];
    col[c] = z;
  }
  col = clamp(col, 0.0, 1.0);
  float v = length(uv - 0.5);
  col *= 1.0 - 0.35 * v * v;
  col += (hash1(gl_FragCoord.xy * 0.71) - 0.5) * 0.012;   // debanding grain
  outC = vec4(pow(clamp(col, 0.0, 1.0), vec3(0.9)), 1.0);
}
</script>

<!-- the glimpses: one spark per training sample, bright where wrong -->
<script type="x-shader/vertex" id="spark-vs">#version 300 es
precision highp float;
uniform sampler2D uCoord, uD3;
out float vErr;
void main() {
  int b = gl_VertexID;
  vec2 uv = texelFetch(uCoord, ivec2(b, 0), 0).xy;
  float e = abs(texelFetch(uD3, ivec2(b, 0), 0).r)
          + abs(texelFetch(uD3, ivec2(b, 1), 0).r)
          + abs(texelFetch(uD3, ivec2(b, 2), 0).r);
  gl_Position = vec4(uv * 2.0 - 1.0, 0.0, 1.0);
  gl_PointSize = 2.0;
  vErr = e;
}
</script>
<script type="x-shader/fragment" id="spark-fs">#version 300 es
precision highp float;
in float vErr;
out vec4 outC;
void main() {
  outC = vec4(vec3(1.0, 0.9, 0.7) * min(vErr * 0.5, 1.0) * 0.45, 1.0);
}
</script>

<script>
const B = 1024, NH = 48, STEPS_PER_FRAME = 8;
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false });
const canFloat = gl && gl.getExtension('EXT_color_buffer_float');
if (!gl || !canFloat) { document.body.innerHTML = '<p style="color:#fff;font-family:monospace;padding:2em">needs WebGL2 + float render targets</p>'; throw new Error('no webgl2/float'); }

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src.trim());
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function program(vsId, fsId) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, document.getElementById(vsId).textContent));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, document.getElementById(fsId).textContent));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}
const P = {
  coord: program('quad-vs', 'coord-fs'),
  h0:    program('quad-vs', 'h0-fs'),
  fwd:   program('quad-vs', 'fwd-fs'),
  d3:    program('quad-vs', 'd3-fs'),
  back:  program('quad-vs', 'back-fs'),
  sgd:   program('quad-vs', 'sgd-fs'),
  disp:  program('quad-vs', 'disp-fs'),
  spark: program('spark-vs', 'spark-fs'),
  ema:   program('quad-vs', 'ema-fs'),
};
const U = {};
for (const [name, prog] of Object.entries(P)) {
  U[name] = {};
  const n = gl.getProgramParameter(prog, gl.ACTIVE_UNIFORMS);
  for (let i = 0; i < n; i++) {
    const info = gl.getActiveUniform(prog, i);
    U[name][info.name.replace('[0]', '')] = gl.getUniformLocation(prog, info.name);
  }
}

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
const emptyVao = gl.createVertexArray();

function makeTex(w, h, fmt) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texStorage2D(gl.TEXTURE_2D, 1, fmt, w, h);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  return { tex, fbo, w, h };
}

// batch activations & deltas
const COORD = makeTex(B, 1, gl.RG32F);
const H0 = makeTex(B, NH, gl.R32F);
const H1 = makeTex(B, NH, gl.R32F);
const H2 = makeTex(B, NH, gl.R32F);
const D3 = makeTex(B, 3,  gl.R32F);
const D2 = makeTex(B, NH, gl.R32F);
const D1 = makeTex(B, NH, gl.R32F);
// weights: 49 columns (48 in + bias) + Adam moments, ping-pong
function makeWeight(w, h) {
  const wt = gl.createTexture(), mv = gl.createTexture();
  for (const [t, fmt] of [[wt, gl.R32F], [mv, gl.RG32F]]) {
    gl.bindTexture(gl.TEXTURE_2D, t);
    gl.texStorage2D(gl.TEXTURE_2D, 1, fmt, w, h);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  }
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, wt, 0);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT1, gl.TEXTURE_2D, mv, 0);
  gl.drawBuffers([gl.COLOR_ATTACHMENT0, gl.COLOR_ATTACHMENT1]);
  return { tex: wt, mv, fbo, w, h };
}
const W1 = [makeWeight(49, NH), makeWeight(49, NH)];
const W2 = [makeWeight(49, NH), makeWeight(49, NH)];
const W3 = [makeWeight(49, 3),  makeWeight(49, 3)];
let w1 = 0, w2 = 0, w3 = 0, needInit = true;

// the eye's copy of the weights — EMA-smoothed, strobe-free
const WE1 = [makeTex(49, NH, gl.R32F), makeTex(49, NH, gl.R32F)];
const WE2 = [makeTex(49, NH, gl.R32F), makeTex(49, NH, gl.R32F)];
const WE3 = [makeTex(49, 3,  gl.R32F), makeTex(49, 3,  gl.R32F)];
let e1 = 0, e2 = 0, e3 = 0, emaInit = true;

// camera (offered on click)
const camTex = makeTex(64, 64, gl.RGBA8);   // replaced on first frame
let video = null, camReady = false, camW = 640, camH = 480;
let realCamTex = null;
addEventListener('pointerdown', async () => {
  if (video) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640 } });
    video = document.createElement('video');
    video.srcObject = stream;
    video.muted = true;
    video.playsInline = true;
    await video.play();
    document.getElementById('hint')?.remove();
  } catch (e) { video = null; }
});
function uploadCam() {
  if (!video || video.readyState < 2) return;
  if (!realCamTex) {
    camW = video.videoWidth; camH = video.videoHeight;
    realCamTex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, realCamTex);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  }
  gl.bindTexture(gl.TEXTURE_2D, realCamTex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, video);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
  camReady = true;
}

let W = 0, H = 0, RS = null;
function resize() {
  const dpr = 1;   // beliefs are soft; retina spends fans on nothing
  W = Math.floor(innerWidth * dpr);
  H = Math.floor(innerHeight * dpr);
  canvas.width = W; canvas.height = H;
  RS = makeTex(Math.max(2, Math.floor(W * 0.42)), Math.max(2, Math.floor(H * 0.42)), gl.RGBA8);
  gl.bindTexture(gl.TEXTURE_2D, RS.tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
}
addEventListener('resize', resize);
resize();

const mouse = { x: 0.5, y: 0.5 };
addEventListener('pointermove', e => {
  mouse.x = e.clientX / innerWidth;
  mouse.y = 1 - e.clientY / innerHeight;
});

function pass(prog, dst, binds, setu) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
  gl.viewport(0, 0, dst.w, dst.h);
  gl.useProgram(prog);
  binds.forEach(([u, tex], i) => {
    gl.activeTexture(gl.TEXTURE0 + i);
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.uniform1i(u, i);
  });
  if (setu) setu();
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

let simT = 0, stepIdx = 0;
const DT = 1 / 60;
const LR = 0.002;   // Adam units

function trainStep() {
  stepIdx++;
  const u = U;

  pass(P.coord, COORD, [], () => gl.uniform1f(u.coord.uStep, stepIdx));
  pass(P.h0, H0, [[u.h0.uCoord, COORD.tex]]);
  pass(P.fwd, H1, [[u.fwd.uW, W1[w1].tex], [u.fwd.uIn, H0.tex]], () => gl.uniform1i(u.fwd.uInN, 48));
  pass(P.fwd, H2, [[u.fwd.uW, W2[w2].tex], [u.fwd.uIn, H1.tex]], () => gl.uniform1i(u.fwd.uInN, 48));
  pass(P.d3, D3, [[u.d3.uW3, W3[w3].tex], [u.d3.uH2, H2.tex], [u.d3.uCoord, COORD.tex],
                  [u.d3.uCam, camReady ? realCamTex : camTex.tex]], () => {
    gl.uniform1f(u.d3.uTime, simT);
    gl.uniform1f(u.d3.uUseCam, camReady ? 1 : 0);
    gl.uniform1f(u.d3.uAspect, W / H);
    gl.uniform1f(u.d3.uCamAspect, camW / camH);
    gl.uniform2f(u.d3.uMouse, mouse.x, mouse.y);
  });
  pass(P.back, D2, [[u.back.uWnext, W3[w3].tex], [u.back.uDnext, D3.tex], [u.back.uH, H2.tex]],
    () => gl.uniform1i(u.back.uNextN, 3));
  pass(P.back, D1, [[u.back.uWnext, W2[w2].tex], [u.back.uDnext, D2.tex], [u.back.uH, H1.tex]],
    () => gl.uniform1i(u.back.uNextN, 48));

  const sgd = (Wpair, cur, Dtex, Atex, seed, scale) => {
    pass(P.sgd, Wpair[1 - cur], [[u.sgd.uW, Wpair[cur].tex], [u.sgd.uMV, Wpair[cur].mv],
                                 [u.sgd.uD, Dtex], [u.sgd.uA, Atex]], () => {
      gl.uniform1i(u.sgd.uInN, 48);
      gl.uniform1f(u.sgd.uLR, LR);
      gl.uniform1f(u.sgd.uReset, needInit ? 1 : 0);
      gl.uniform1f(u.sgd.uSeed, seed);
      gl.uniform1f(u.sgd.uScale, scale);
      gl.uniform1f(u.sgd.uT, Math.min(stepIdx, 100000));
    });
  };
  sgd(W3, w3, D3.tex, H2.tex, 13.7, 0.6); w3 = 1 - w3;
  sgd(W2, w2, D2.tex, H1.tex, 7.1, 0.5);  w2 = 1 - w2;
  sgd(W1, w1, D1.tex, H0.tex, 3.9, 0.6);  w1 = 1 - w1;
  needInit = false;
}

function step() {
  simT += DT;
  for (let s = 0; s < STEPS_PER_FRAME; s++) trainStep();
  const ema = (WE, cur, Wt) => {
    pass(P.ema, WE[1 - cur], [[U.ema.uWE, WE[cur].tex], [U.ema.uW, Wt]],
      () => gl.uniform1f(U.ema.uInit, emaInit ? 1 : 0));
  };
  ema(WE1, e1, W1[w1].tex); e1 = 1 - e1;
  ema(WE2, e2, W2[w2].tex); e2 = 1 - e2;
  ema(WE3, e3, W3[w3].tex); e3 = 1 - e3;
  emaInit = false;
}

function render() {
  // the belief, at 55% resolution — beliefs are soft
  pass(P.disp, RS, [[U.disp.uW1, WE1[e1].tex], [U.disp.uW2, WE2[e2].tex], [U.disp.uW3, WE3[e3].tex]],
    () => gl.uniform2f(U.disp.uRes, RS.w, RS.h));

  // upscale to screen (RGBA8 → RGBA8, so blit is legal)
  gl.bindFramebuffer(gl.READ_FRAMEBUFFER, RS.fbo);
  gl.bindFramebuffer(gl.DRAW_FRAMEBUFFER, null);
  gl.blitFramebuffer(0, 0, RS.w, RS.h, 0, 0, W, H, gl.COLOR_BUFFER_BIT, gl.LINEAR);

  // the glimpses
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.useProgram(P.spark);
  gl.bindVertexArray(emptyVao);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, COORD.tex);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, D3.tex);
  gl.uniform1i(U.spark.uCoord, 0);
  gl.uniform1i(U.spark.uD3, 1);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE);
  gl.drawArrays(gl.POINTS, 0, B);
  gl.disable(gl.BLEND);
  gl.bindVertexArray(vao);
}

// ?warp=N pre-runs N frames before first paint — headless capture
// can't fast-forward requestAnimationFrame, so the piece does it itself
const warp = Math.min(20000, parseInt(new URLSearchParams(location.search).get('warp'), 10) || 0);
for (let i = 0; i < warp; i++) step();

function frame() {
  uploadCam();
  step();
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

if (window.self !== window.top) document.getElementById('hint')?.remove();
else setTimeout(() => { const h = document.getElementById('hint'); if (h) h.style.opacity = 0; }, 14000);
</script>
</body>
