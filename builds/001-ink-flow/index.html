<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ink flow — feedback + curl noise</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  #hint {
    position: fixed; bottom: 12px; left: 14px;
    font: 12px/1.4 ui-monospace, monospace; color: rgba(255,255,255,.45);
    user-select: none; pointer-events: none;
    transition: opacity 2s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">move the mouse to stir &middot; the image is never redrawn from scratch &mdash; every frame is last frame, pushed around a flow field</div>

<!-- ============================================================
     SIMULATION SHADER — the feedback pass.
     Reads the PREVIOUS frame, moves each pixel along a curl-noise
     flow field (advection), fades it slightly, and injects new
     "ink". The output becomes the input next frame. That loop is
     the whole trick.
============================================================ -->
<script type="x-shader/fragment" id="sim-fs">#version 300 es
precision highp float;

uniform sampler2D uPrev;   // last frame's simulation state
uniform vec2  uRes;
uniform float uTime;
uniform vec2  uMouse;      // pixels
uniform vec2  uMouseVel;   // pixels/frame
uniform float uMouseOn;

out vec4 outColor;

// ---- tweak these ------------------------------------------------
const float NOISE_SCALE   = 2.2;    // bigger = tighter swirls
const float FLOW_STRENGTH = 0.0016; // how far pixels travel per frame
const float DRIFT         = 0.06;   // how fast the flow field itself evolves
const float DECAY         = 0.995;  // 1.0 = ink never fades
const float INK_AMOUNT    = 0.016;  // strength of the ambient ink source
// -----------------------------------------------------------------

// value noise + fbm ("fractal Brownian motion" — noise stacked in octaves)
float hash(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1, 0));
  float c = hash(i + vec2(0, 1));
  float d = hash(i + vec2(1, 1));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, amp = 0.5;
  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
  for (int i = 0; i < 5; i++) {
    v += amp * noise(p);
    p = rot * p * 2.0;
    amp *= 0.5;
  }
  return v;
}

// curl of the noise field: rotate the gradient 90 degrees and you get
// a divergence-free flow — everything swirls, nothing piles up.
vec2 curl(vec2 p) {
  float e = 0.02;
  float dy = fbm(p + vec2(0, e)) - fbm(p - vec2(0, e));
  float dx = fbm(p + vec2(e, 0)) - fbm(p - vec2(e, 0));
  return vec2(dy, -dx) / (2.0 * e);
}

// IQ's cosine palette — cheap, endlessly tweakable color
vec3 palette(float t) {
  return 0.5 + 0.5 * cos(6.28318 * (vec3(1.0, 1.0, 1.0) * t + vec3(0.00, 0.33, 0.67)));
}

void main() {
  vec2 uv  = gl_FragCoord.xy / uRes;
  vec2 asp = vec2(uRes.x / uRes.y, 1.0);
  vec2 p   = uv * asp;

  // the flow field, slowly drifting through noise space over time
  vec2 flow = curl(p * NOISE_SCALE + vec2(uTime * DRIFT, -uTime * DRIFT * 0.7));

  // ADVECTION: look backwards along the flow and take that pixel's color
  vec2 disp = flow * FLOW_STRENGTH / asp;

  // mouse adds a local shove in the direction you're moving
  vec2 mp = (uMouse / uRes) * asp;
  float md = length(p - mp);
  float splat = exp(-md * md * 300.0) * uMouseOn;
  disp += (uMouseVel / uRes) * splat * 1.5;

  vec3 prev = texture(uPrev, uv - disp).rgb;

  // ambient ink source: sparse blobs of domain-warped noise, hue cycling over time
  float ink = fbm(p * 3.0 + flow * 0.4 + uTime * 0.03);
  ink = smoothstep(0.62, 0.92, ink);
  vec3 inject = palette(uTime * 0.02 + fbm(p * 1.5)) * ink * INK_AMOUNT;

  // mouse also deposits ink, colored by time so strokes shift hue
  inject += palette(uTime * 0.13) * splat * 0.25;

  vec3 col = prev * DECAY + inject;
  outColor = vec4(min(col, vec3(4.0)), 1.0);
}
</script>

<!-- ============================================================
     DISPLAY SHADER — just tone-maps the simulation to the screen.
============================================================ -->
<script type="x-shader/fragment" id="show-fs">#version 300 es
precision highp float;
uniform sampler2D uTex;
uniform vec2 uRes;
out vec4 outColor;

void main() {
  vec2 uv = gl_FragCoord.xy / uRes;
  vec3 c = texture(uTex, uv).rgb;

  c = 1.0 - exp(-c * 1.4);                    // soft filmic curve
  float v = length(uv - 0.5);
  c *= 1.0 - 0.35 * v * v;                    // vignette
  c = pow(c, vec3(0.4545));                   // gamma

  outColor = vec4(c, 1.0);
}
</script>

<script type="x-shader/vertex" id="vs">#version 300 es
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
</script>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;font-family:monospace;padding:2em">WebGL2 not available</p>'; throw new Error('no webgl2'); }

// half-float framebuffers so the feedback loop doesn't band/posterize
const canFloat = !!gl.getExtension('EXT_color_buffer_float');

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src.trim());
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function program(fsId) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, document.getElementById('vs').textContent));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, document.getElementById(fsId).textContent));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}

const simProg  = program('sim-fs');
const showProg = program('show-fs');

// one fullscreen triangle
const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

// ping-pong framebuffers: read from one, write to the other, swap
let W = 0, H = 0;
let targets = null;

function makeTarget() {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  if (canFloat) {
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, W, H, 0, gl.RGBA, gl.HALF_FLOAT, null);
  } else {
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, W, H, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  }
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);
  return { tex, fbo };
}

function resize() {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  W = Math.floor(innerWidth * dpr);
  H = Math.floor(innerHeight * dpr);
  canvas.width = W;
  canvas.height = H;
  targets = [makeTarget(), makeTarget()];
}
addEventListener('resize', resize);
resize();

// mouse / touch
const mouse = { x: -1e4, y: -1e4, vx: 0, vy: 0, on: 0 };
function point(x, y) {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  const nx = x * dpr, ny = H - y * dpr;
  if (mouse.on) { mouse.vx = nx - mouse.x; mouse.vy = ny - mouse.y; }
  mouse.x = nx; mouse.y = ny; mouse.on = 1;
}
addEventListener('mousemove', e => point(e.clientX, e.clientY));
addEventListener('mouseleave', () => { mouse.on = 0; });
addEventListener('touchmove', e => { point(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
addEventListener('touchend', () => { mouse.on = 0; });

const simU = {
  prev: gl.getUniformLocation(simProg, 'uPrev'),
  res: gl.getUniformLocation(simProg, 'uRes'),
  time: gl.getUniformLocation(simProg, 'uTime'),
  mouse: gl.getUniformLocation(simProg, 'uMouse'),
  mouseVel: gl.getUniformLocation(simProg, 'uMouseVel'),
  mouseOn: gl.getUniformLocation(simProg, 'uMouseOn'),
};
const showU = {
  tex: gl.getUniformLocation(showProg, 'uTex'),
  res: gl.getUniformLocation(showProg, 'uRes'),
};

let read = 0;
const t0 = performance.now();

function frame() {
  const t = (performance.now() - t0) / 1000;

  // --- simulation pass: prev frame in, next frame out ---
  gl.bindFramebuffer(gl.FRAMEBUFFER, targets[1 - read].fbo);
  gl.viewport(0, 0, W, H);
  gl.useProgram(simProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, targets[read].tex);
  gl.uniform1i(simU.prev, 0);
  gl.uniform2f(simU.res, W, H);
  gl.uniform1f(simU.time, t);
  gl.uniform2f(simU.mouse, mouse.x, mouse.y);
  gl.uniform2f(simU.mouseVel, mouse.vx, mouse.vy);
  gl.uniform1f(simU.mouseOn, mouse.on);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  read = 1 - read;

  // --- display pass: tone-map the sim to the screen ---
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.useProgram(showProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, targets[read].tex);
  gl.uniform1i(showU.tex, 0);
  gl.uniform2f(showU.res, W, H);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  mouse.vx *= 0.5; mouse.vy *= 0.5; // velocity fades between events

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// no hint when embedded as a gallery preview
if (window.self !== window.top) document.getElementById('hint').remove();
else setTimeout(() => { document.getElementById('hint').style.opacity = 0; }, 12000);
</script>
</body>
</html>
