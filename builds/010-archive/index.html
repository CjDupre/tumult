<!-- ============================================================
     ARCHIVE. The dataset does not change; the function does.
     Each particle belongs to one real earthquake and carries its
     (time, lat, lon, magnitude, depth). Four projections of that
     record — a globe, a time helix, a magnitude wall, a storm —
     take turns as the attractor, and the swarm migrates between
     them in chronological order, oldest quakes first. Meanwhile
     the replay cursor from 009 keeps sweeping: when a particle's
     own date comes around, it flares. Same archive, four dreams.
============================================================ -->
<script type="x-shader/fragment" id="sim-fs">#version 300 es
precision highp float;

uniform sampler2D uPos;      // xyz + flare
uniform sampler2D uVel;      // xyz
uniform sampler2D uEv;       // lat, lon, amp, depth
uniform sampler2D uEvT;      // event time (days)
uniform float uTime, uReset, uReplayT, uLastDay;
uniform float uSeg, uFrac;   // which projection, and how far into it

layout(location = 0) out vec4 outPos;
layout(location = 1) out vec4 outVel;

// ---- tweak these ------------------------------------------------
const float SPRING = 0.014;   // pull toward the current projection
const float DRAG   = 0.88;
const float TURB   = 0.0004;  // baseline restlessness
const float STORMY = 0.009;   // turbulence mid-morph and in the storm
const int   N_EV   = 24451;
// -----------------------------------------------------------------

float hash1(vec3 p) {
  p = fract(p * 0.1031);
  p += dot(p, p.zyx + 31.32);
  return fract((p.x + p.y) * p.z);
}
float noise(vec3 p) {
  vec3 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(mix(hash1(i),                 hash1(i + vec3(1, 0, 0)), f.x),
                 mix(hash1(i + vec3(0, 1, 0)), hash1(i + vec3(1, 1, 0)), f.x), f.y),
             mix(mix(hash1(i + vec3(0, 0, 1)), hash1(i + vec3(1, 0, 1)), f.x),
                 mix(hash1(i + vec3(0, 1, 1)), hash1(i + vec3(1, 1, 1)), f.x), f.y), f.z);
}
float fbm(vec3 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 3; i++) { v += a * noise(p); p = p * 2.13 + vec3(1.7, 9.2, 4.1); a *= 0.5; }
  return v - 0.44;
}
vec4 fieldGrad(vec3 p) {
  const vec2 e = vec2(1.0, -1.0) * 0.02;
  float f1 = fbm(p + e.xyy), f2 = fbm(p + e.yyx), f3 = fbm(p + e.yxy), f4 = fbm(p + e.xxx);
  return vec4((e.xyy * f1 + e.yyx * f2 + e.yxy * f3 + e.xxx * f4) / (4.0 * 0.02 * 0.02),
              (f1 + f2 + f3 + f4) * 0.25);
}

// the four functions of the record ------------------------------
vec3 projGlobe(vec4 ev, vec3 j) {
  vec3 n = vec3(cos(ev.x) * sin(ev.y), sin(ev.x), cos(ev.x) * cos(ev.y));
  return n * 1.05 + j * (0.008 + 0.02 * pow(ev.z, 0.33));
}
vec3 projHelix(vec4 ev, float t01, vec3 j) {
  float ang = t01 * 6.2831853 * 8.0;                  // ~6½ years per turn
  float r = 0.85 + pow(ev.z, 0.4) * 0.13;
  return vec3(cos(ang) * r, t01 * 1.9 - 0.95, sin(ang) * r)
       + j * (0.010 + 0.025 * pow(ev.z, 0.33));
}
vec3 projWall(vec4 ev, float t01, vec3 j) {
  return vec3(t01 * 2.6 - 1.3,
              pow(ev.z, 0.28) * 1.9 - 0.95,           // magnitude, wedge-shaped
              (ev.w - 0.5) * 0.9)
       + j * 0.012;
}

void main() {
  ivec2 ij = ivec2(gl_FragCoord.xy);
  int pid = ij.y * 1024 + ij.x;
  int eid = pid % N_EV;
  ivec2 eat = ivec2(eid % 2048, eid / 2048);
  vec4 ev = texelFetch(uEv, eat, 0);
  float evT = texelFetch(uEvT, eat, 0).r;
  float t01 = evT / uLastDay;

  // this particle's private jitter — its seat within the event's cloud
  vec3 j = vec3(hash1(vec3(float(pid), 1.0, 7.7)),
                hash1(vec3(float(pid), 4.2, 2.3)),
                hash1(vec3(float(pid), 9.1, 5.9))) * 2.0 - 1.0;

  if (uReset > 0.5) {
    outPos = vec4(projGlobe(ev, j), 0.0);
    outVel = vec4(0.0);
    return;
  }

  vec3 p = texelFetch(uPos, ij, 0).xyz;
  vec3 v = texelFetch(uVel, ij, 0).xyz;

  // migration is data-ordered: each particle changes allegiance when the
  // sweep reaches ITS moment in history — the morph plays the timeline
  float myFrac = clamp((uFrac * 1.35 - t01 * 0.35) * 4.0, 0.0, 1.0);
  float sm = myFrac * myFrac * (3.0 - 2.0 * myFrac);

  int segA = int(uSeg), segB = (segA + 1) % 4;
  vec3 tA = segA == 0 ? projGlobe(ev, j) : segA == 1 ? projHelix(ev, t01, j) : projWall(ev, t01, j);
  vec3 tB = segB == 0 ? projGlobe(ev, j) : segB == 1 ? projHelix(ev, t01, j) : projWall(ev, t01, j);
  float stormA = segA == 3 ? 1.0 : 0.0, stormB = segB == 3 ? 1.0 : 0.0;
  vec3 target = mix(tA, tB, sm);
  float storm = mix(stormA, stormB, sm);

  // mid-morph everyone is briefly weather
  float churn = sm * (1.0 - sm) * 4.0;
  float turb = TURB + STORMY * max(storm, churn * 0.35);

  // the storm flow: cross of two fbm gradients, along their intersections
  vec4 A = fieldGrad(p * 1.3 + vec3(0.0, uTime * 0.05, 0.0));
  vec4 B = fieldGrad(p * 1.3 + vec3(uTime * 0.035, 0.0, 5.8));
  vec3 flow = cross(A.xyz, B.xyz);
  vec3 gather = -(A.w * A.xyz + B.w * B.xyz);

  v += (target - p) * SPRING * (1.0 - storm * 0.92);
  v += (flow / (length(flow) + 1e-4) * 0.45 + gather * 2.0) * turb;
  v *= DRAG;
  p += v;

  // the replay cursor: flare when this particle's own date comes around
  float age = uReplayT - evT;
  float flare = age > 0.0 ? exp(-age / 55.0) * (0.4 + 0.6 * pow(ev.z, 0.4)) : 0.0;

  outPos = vec4(p, flare);
  outVel = vec4(v, 0.0);
}
</script>

<!-- draw: depth-colored record dust; flaring when its date is now -->
<script type="x-shader/vertex" id="pt-vs">#version 300 es
precision highp float;
uniform sampler2D uPos;
uniform sampler2D uVel;
uniform sampler2D uEv;
uniform sampler2D uEvT;
uniform mat4 uProjView;
uniform float uPointBase, uLastDay;
out vec3 vColor;

const int N_EV = 24451;

void main() {
  ivec2 ij = ivec2(gl_VertexID % 1024, gl_VertexID / 1024);
  vec4 P = texelFetch(uPos, ij, 0);
  vec3 vel = texelFetch(uVel, ij, 0).xyz;
  int eid = (ij.y * 1024 + ij.x) % N_EV;
  ivec2 eat = ivec2(eid % 2048, eid / 2048);
  vec4 ev = texelFetch(uEv, eat, 0);
  float t01 = texelFetch(uEvT, eat, 0).r / uLastDay;

  vec4 clip = uProjView * vec4(P.xyz, 1.0);
  gl_Position = clip;
  float w = max(clip.w, 0.15);
  gl_PointSize = clamp(uPointBase / w, 1.0, 4.0);

  // three data dimensions, three color duties: era sets the hue
  // (1975 teal → 2026 amber), depth pulls it toward subduction
  // violet, and the flare when its own date passes is white heat
  vec3 col = mix(vec3(0.15, 0.70, 0.90), vec3(1.00, 0.60, 0.20), t01);
  col = mix(col, vec3(0.50, 0.22, 1.00), pow(ev.w, 0.6) * 0.75);
  float speed = length(vel);
  float fog = exp(-(w - 1.6) * 0.45);
  vColor = (col * (0.22 + speed * 34.0) + vec3(1.0, 0.95, 0.85) * P.w * 1.6) * fog;
}
</script>
<script type="x-shader/fragment" id="pt-fs">#version 300 es
precision highp float;
in vec3 vColor;
out vec4 outColor;
void main() {
  float d = length(gl_PointCoord - 0.5);
  float a = smoothstep(0.5, 0.0, d);
  outColor = vec4(vColor * a * 0.07, 1.0);
}
</script>

<script type="x-shader/fragment" id="fade-fs">#version 300 es
precision highp float;
uniform sampler2D uTrail;
uniform vec2 uRes;
out vec4 outColor;
void main() {
  vec3 c = texture(uTrail, gl_FragCoord.xy / uRes).rgb;
  outColor = vec4(c * 0.92, 1.0);
}
</script>

<script type="x-shader/fragment" id="show-fs">#version 300 es
precision highp float;
uniform sampler2D uTrail;
uniform vec2 uRes;
out vec4 outColor;
void main() {
  vec2 uv = gl_FragCoord.xy / uRes;
  vec3 c = texture(uTrail, uv).rgb;
  c = 1.0 - exp(-c * 3.4);
  float v = length(uv - 0.5);
  c *= 1.0 - 0.4 * v * v;
  outColor = vec4(pow(c, vec3(0.4545)), 1.0);
}
</script>

void main() { gl_Position = vec4(aPos, 0.0, 1.0); }

const N_SIDE = 1024;
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false });
const canFloat = gl && gl.getExtension('EXT_color_buffer_float');
if (!gl || !canFloat) { document.body.innerHTML = '<p style="color:#fff;font-family:monospace;padding:2em">needs WebGL2 + float render targets</p>'; throw new Error('no webgl2/float'); }

const bin = Uint8Array.from(atob(B64), c => c.charCodeAt(0));
const dv = new DataView(bin.buffer);
const N_EV = bin.length / 8;
const EW = 2048, EH = Math.ceil(N_EV / EW);
const times = new Float32Array(EW * EH);
const evData = new Float32Array(EW * EH * 4);
for (let i = 0; i < N_EV; i++) {
  const lat = (dv.getUint16(i * 8 + 2, true) / 65535 * 180 - 90) * Math.PI / 180;
  const lon = (dv.getUint16(i * 8 + 4, true) / 65535 * 360 - 180) * Math.PI / 180;
  const mag = 5.5 + bin[i * 8 + 6] / 25;
  times[i] = dv.getUint16(i * 8, true) / 2;
  evData[i * 4]     = lat;
  evData[i * 4 + 1] = lon;
  evData[i * 4 + 2] = Math.pow(10, 0.65 * (mag - 5.5)) / 218.0;   // 0..1
  evData[i * 4 + 3] = Math.min(bin[i * 8 + 7] * 3 / 700, 1);
}
const LAST_DAY = times[N_EV - 1];

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src.trim());
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function program(vsId, fsId) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, document.getElementById(vsId).textContent));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, document.getElementById(fsId).textContent));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}
const simProg  = program('quad-vs', 'sim-fs');
const ptProg   = program('pt-vs', 'pt-fs');
const fadeProg = program('quad-vs', 'fade-fs');
const showProg = program('quad-vs', 'show-fs');

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
const emptyVao = gl.createVertexArray();

function makeTex(w, h, fmt, filter) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texStorage2D(gl.TEXTURE_2D, 1, fmt, w, h);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return tex;
}
function fboFor(...texes) {
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  texes.forEach((t, i) => gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0 + i, gl.TEXTURE_2D, t, 0));
  if (texes.length > 1) gl.drawBuffers(texes.map((_, i) => gl.COLOR_ATTACHMENT0 + i));
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  return fbo;
}

const evTex = makeTex(EW, EH, gl.RGBA32F, gl.NEAREST);
gl.bindTexture(gl.TEXTURE_2D, evTex);
gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, EW, EH, gl.RGBA, gl.FLOAT, evData);
const evTTex = makeTex(EW, EH, gl.R32F, gl.NEAREST);
gl.bindTexture(gl.TEXTURE_2D, evTTex);
gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, EW, EH, gl.RED, gl.FLOAT, times);

function makeState() {
  const pos = makeTex(N_SIDE, N_SIDE, gl.RGBA32F, gl.NEAREST);
  const vel = makeTex(N_SIDE, N_SIDE, gl.RGBA32F, gl.NEAREST);
  return { pos, vel, fbo: fboFor(pos, vel) };
}
const state = [makeState(), makeState()];
let sRead = 0, needReset = true;

let W = 0, H = 0, trail = null, tRead = 0;
function makeTrail(w, h) { const t = makeTex(w, h, gl.RGBA16F, gl.LINEAR); return { tex: t, fbo: fboFor(t) }; }
function resize() {
  const dpr = Math.min(devicePixelRatio || 1, 1.5);
  W = Math.floor(innerWidth * dpr);
  H = Math.floor(innerHeight * dpr);
  canvas.width = W; canvas.height = H;
  trail = [makeTrail(W, H), makeTrail(W, H)];
}
addEventListener('resize', resize);
resize();

const cam = { yaw: 0, pitch: 0, dist: 0, vyaw: 0, vpitch: 0 };
let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('pointerdown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  cam.vyaw = 0; cam.vpitch = 0;
  canvas.classList.add('dragging'); canvas.setPointerCapture(e.pointerId);
});
addEventListener('pointermove', e => {
  if (!dragging) return;
  cam.vyaw   = (e.clientX - lastX) * 0.005;
  cam.vpitch = (e.clientY - lastY) * 0.005;
  cam.yaw += cam.vyaw; cam.pitch += cam.vpitch;
  lastX = e.clientX; lastY = e.clientY;
});
addEventListener('pointerup', () => { dragging = false; canvas.classList.remove('dragging'); });
addEventListener('wheel', e => { cam.dist = Math.max(-1.2, Math.min(2.0, cam.dist + e.deltaY * 0.002)); }, { passive: true });

function projView(t) {
  if (!dragging) { cam.yaw += cam.vyaw; cam.pitch += cam.vpitch; cam.vyaw *= 0.95; cam.vpitch *= 0.95; }
  const yaw   = t * 0.05 + cam.yaw;
  const pitch = Math.max(-1.3, Math.min(1.3, 0.24 + 0.12 * Math.sin(t * 0.041) + cam.pitch));
  const dist  = 3.1 + 0.2 * Math.sin(t * 0.023) + cam.dist;

  const cp = Math.cos(pitch), sp = Math.sin(pitch);
  const cy = Math.cos(yaw),   sy = Math.sin(yaw);
  const eye = [dist * cp * sy, dist * sp, dist * cp * cy];

  let zx = eye[0], zy = eye[1], zz = eye[2];
  const zl = Math.hypot(zx, zy, zz); zx /= zl; zy /= zl; zz /= zl;
  let xx = zz, xz = -zx;
  const xl = Math.hypot(xx, xz); xx /= xl; xz /= xl;
  const yx = zy * xz, yy = zz * xx - zx * xz, yz = -zy * xx;

  const f = 1 / Math.tan(0.436), n = 0.1, fa = 12.0;
  const a = W / H;
  const px = f / a, py = f;
  const pz = (fa + n) / (n - fa), pw = (2 * fa * n) / (n - fa);
  const ex = -(xx * eye[0] + xz * eye[2]);
  const ey = -(yx * eye[0] + yy * eye[1] + yz * eye[2]);
  const ez = -(zx * eye[0] + zy * eye[1] + zz * eye[2]);
  return new Float32Array([
    px * xx, py * yx, pz * zx, -zx,
    0,       py * yy, pz * zy, -zy,
    px * xz, py * yz, pz * zz, -zz,
    px * ex, py * ey, pz * ez + pw, -ez,
  ]);
}

const loc = (p, k) => gl.getUniformLocation(p, k) ?? gl.getUniformLocation(p, k + '[0]');
const U = {};
for (const [name, prog, keys] of [
  ['sim',  simProg,  ['uPos', 'uVel', 'uEv', 'uEvT', 'uTime', 'uReset', 'uReplayT', 'uLastDay', 'uSeg', 'uFrac']],
  ['pt',   ptProg,   ['uPos', 'uVel', 'uEv', 'uEvT', 'uProjView', 'uPointBase', 'uLastDay']],
  ['fade', fadeProg, ['uTrail', 'uRes']],
  ['show', showProg, ['uTrail', 'uRes']],
]) U[name] = keys.reduce((o, k) => (o[k] = loc(prog, k), o), {});

let simT = 0, replayT = 0;
const DT = 1 / 60;
const SEG_LEN = 26.0;             // seconds per projection
const DAYS_PER_TICK = 2.2;        // replay loops ~2.4× per full cycle

const MODE_NAMES = ['globe', 'time helix', 'magnitude wall', 'storm'];

function step() {
  simT += DT;
  replayT += DAYS_PER_TICK;
  if (replayT > LAST_DAY + 400) replayT = 0;

  const cyc = (simT / SEG_LEN) % 4;
  const seg = Math.floor(cyc);
  const frac = cyc - seg;

  gl.bindVertexArray(vao);
  gl.bindFramebuffer(gl.FRAMEBUFFER, state[1 - sRead].fbo);
  gl.viewport(0, 0, N_SIDE, N_SIDE);
  gl.useProgram(simProg);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, state[sRead].pos);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, state[sRead].vel);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, evTex);
  gl.activeTexture(gl.TEXTURE3); gl.bindTexture(gl.TEXTURE_2D, evTTex);
  gl.uniform1i(U.sim.uPos, 0); gl.uniform1i(U.sim.uVel, 1);
  gl.uniform1i(U.sim.uEv, 2);  gl.uniform1i(U.sim.uEvT, 3);
  gl.uniform1f(U.sim.uTime, simT);
  gl.uniform1f(U.sim.uReset, needReset ? 1 : 0);
  gl.uniform1f(U.sim.uReplayT, replayT);
  gl.uniform1f(U.sim.uLastDay, LAST_DAY);
  gl.uniform1f(U.sim.uSeg, seg);
  gl.uniform1f(U.sim.uFrac, frac);
  needReset = false;
  gl.drawArrays(gl.TRIANGLES, 0, 3);
  sRead = 1 - sRead;

  // trails
  gl.bindFramebuffer(gl.FRAMEBUFFER, trail[1 - tRead].fbo);
  gl.viewport(0, 0, W, H);
  gl.useProgram(fadeProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, trail[tRead].tex);
  gl.uniform1i(U.fade.uTrail, 0);
  gl.uniform2f(U.fade.uRes, W, H);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  gl.useProgram(ptProg);
  gl.bindVertexArray(emptyVao);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, state[sRead].pos);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, state[sRead].vel);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, evTex);
  gl.activeTexture(gl.TEXTURE3); gl.bindTexture(gl.TEXTURE_2D, evTTex);
  gl.uniform1i(U.pt.uPos, 0); gl.uniform1i(U.pt.uVel, 1); gl.uniform1i(U.pt.uEv, 2);
  gl.uniform1i(U.pt.uEvT, 3);
  gl.uniform1f(U.pt.uLastDay, LAST_DAY);
  gl.uniformMatrix4fv(U.pt.uProjView, false, projView(simT));
  gl.uniform1f(U.pt.uPointBase, Math.max(2.6, W / 520));
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE);
  gl.drawArrays(gl.POINTS, 0, N_SIDE * N_SIDE);
  gl.disable(gl.BLEND);
  tRead = 1 - tRead;

  return { seg, frac };
}

const dayEl = document.getElementById('day');
const modeEl = document.getElementById('mode');
const EPOCH = Date.UTC(1975, 0, 1);

function render(seg, frac) {
  gl.bindVertexArray(vao);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.useProgram(showProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, trail[tRead].tex);
  gl.uniform1i(U.show.uTrail, 0);
  gl.uniform2f(U.show.uRes, W, H);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  dayEl.textContent = new Date(EPOCH + Math.min(replayT, LAST_DAY) * 86400e3).toISOString().slice(0, 10);
  modeEl.textContent = frac < 0.35 && seg > -1 ? MODE_NAMES[seg] :
    frac > 0.65 ? MODE_NAMES[(seg + 1) % 4] : '⇢';
}

// ?warp=N pre-runs N frames before first paint — headless capture
// can't fast-forward requestAnimationFrame, so the piece does it itself
const warp = Math.min(40000, parseInt(new URLSearchParams(location.search).get('warp'), 10) || 0);
let last = { seg: 0, frac: 0 };
for (let i = 0; i < warp; i++) last = step();

function frame() {
  last = step();
  render(last.seg, last.frac);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

if (window.self !== window.top) document.getElementById('hint')?.remove();
else setTimeout(() => { const h = document.getElementById('hint'); if (h) h.style.opacity = 0; }, 14000);
</script>
