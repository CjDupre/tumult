<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>coral bloom — reaction-diffusion</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  #hint {
    position: fixed; bottom: 12px; left: 14px;
    font: 12px/1.4 ui-monospace, monospace; color: rgba(255,255,255,.45);
    user-select: none; pointer-events: none;
    transition: opacity 2s ease;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">draw to seed growth &middot; press R to wipe &middot; two chemicals feeding on each other, ten simulation steps per frame</div>

<!-- ============================================================
     SIMULATION — Gray-Scott reaction-diffusion.
     Two chemicals in every texel: A (substrate, red channel) and
     B (activator, green channel). B eats A to make more B; A is
     fed in, B decays. Diffusing at different rates, that tension
     grows spots, stripes, and labyrinths. The feed/kill rates
     drift slowly across the canvas, so regions grow differently
     and the borders between regimes churn forever.
============================================================ -->
<script type="x-shader/fragment" id="sim-fs">#version 300 es
precision highp float;

uniform sampler2D uPrev;
uniform vec2  uRes;      // simulation resolution
uniform float uTime;
uniform vec2  uMouse;    // sim pixels
uniform float uMouseOn;
uniform float uReset;

out vec4 outColor;

// ---- tweak these ------------------------------------------------
const float DA = 1.0;    // diffusion of A
const float DB = 0.5;    // diffusion of B — the ratio sets pattern character
const float PARAM_DRIFT = 0.012;           // how fast the regime map wanders
// -----------------------------------------------------------------

float hash(vec2 p) {
  p = fract(p * vec2(123.34, 456.21));
  p += dot(p, p + 45.32);
  return fract(p.x * p.y);
}
float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1, 0)), f.x),
             mix(hash(i + vec2(0, 1)), hash(i + vec2(1, 1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
  for (int i = 0; i < 4; i++) { v += a * noise(p); p = rot * p * 2.0; a *= 0.5; }
  return v;
}

void main() {
  vec2 uv = gl_FragCoord.xy / uRes;

  if (uReset > 0.5) {
    // substrate everywhere, activator in a few noise-carved islands.
    // seed B gently — at full strength the interior locks into a stable
    // saturated state instead of breaking into stripes
    float b = smoothstep(0.55, 0.68, fbm(uv * vec2(uRes.x / uRes.y, 1.0) * 6.0));
    outColor = vec4(1.0, b * 0.35, 0.0, 1.0);
    return;
  }

  vec2 px = 1.0 / uRes;
  vec4 c = texture(uPrev, uv);

  // 9-point laplacian, center weight -1
  vec2 lap = -c.rg;
  lap += 0.2  * texture(uPrev, uv + px * vec2( 1,  0)).rg;
  lap += 0.2  * texture(uPrev, uv + px * vec2(-1,  0)).rg;
  lap += 0.2  * texture(uPrev, uv + px * vec2( 0,  1)).rg;
  lap += 0.2  * texture(uPrev, uv + px * vec2( 0, -1)).rg;
  lap += 0.05 * texture(uPrev, uv + px * vec2( 1,  1)).rg;
  lap += 0.05 * texture(uPrev, uv + px * vec2(-1,  1)).rg;
  lap += 0.05 * texture(uPrev, uv + px * vec2( 1, -1)).rg;
  lap += 0.05 * texture(uPrev, uv + px * vec2(-1, -1)).rg;

  // the regime map: rather than mixing feed & kill independently (most of
  // that rectangle is dead — B saturates or starves), slide along the ridge
  // of known pattern-forming regimes: mitosis → worms → coral
  float n = fbm(uv * 2.5 + uTime * PARAM_DRIFT) * 0.75;   // biased toward mitosis
  float f = mix(0.0367, 0.0545, n);
  float k = mix(0.0649, 0.0620, n) + (fbm(uv * 2.5 - uTime * PARAM_DRIFT + 7.31) - 0.5) * 0.002;

  float A = c.r, B = c.g;
  float reaction = A * B * B;
  A += DA * lap.x - reaction + f * (1.0 - A);
  B += DB * lap.y + reaction - (f + k) * B;

  // a wandering seeder keeps the dish alive if a regime collapses
  vec2 seed = uRes * (0.5 + 0.42 * vec2(sin(uTime * 0.23), cos(uTime * 0.31)));
  float sd = length(gl_FragCoord.xy - seed);
  B = max(B, 0.3 * exp(-sd * sd * 0.01));

  // mouse paints activator
  float md = length(gl_FragCoord.xy - uMouse);
  B = max(B, uMouseOn * 0.6 * exp(-md * md * 0.008));

  outColor = vec4(clamp(A, 0.0, 1.0), clamp(B, 0.0, 1.0), 0.0, 1.0);
}
</script>

<!-- ============================================================
     DISPLAY — light the chemical field like a wet surface.
     The gradient of B becomes a surface normal; one key light and
     a rim light do the rest. Color comes from a cosine palette
     indexed by the chemistry itself.
============================================================ -->
<script type="x-shader/fragment" id="show-fs">#version 300 es
precision highp float;
uniform sampler2D uTex;
uniform vec2  uRes;      // screen resolution
uniform vec2  uSimRes;
uniform float uTime;
out vec4 outColor;

vec3 palette(float t) {
  return 0.5 + 0.5 * cos(6.28318 * (vec3(0.9, 1.0, 1.1) * t + vec3(0.05, 0.42, 0.65)));
}

void main() {
  vec2 uv = gl_FragCoord.xy / uRes;
  vec2 px = 1.0 / uSimRes;

  float B  = texture(uTex, uv).g;
  float Bx = texture(uTex, uv + vec2(px.x, 0)).g - texture(uTex, uv - vec2(px.x, 0)).g;
  float By = texture(uTex, uv + vec2(0, px.y)).g - texture(uTex, uv - vec2(0, px.y)).g;

  vec3 n = normalize(vec3(-Bx, -By, 0.14));            // gradient as relief
  vec3 L = normalize(vec3(0.5, 0.65, 0.6));
  vec3 V = vec3(0.0, 0.0, 1.0);

  float diff = max(dot(n, L), 0.0);
  float spec = pow(max(dot(n, normalize(L + V)), 0.0), 42.0);
  float rim  = pow(1.0 - n.z, 2.2);

  float mask = smoothstep(0.12, 0.42, B);              // where the coral is
  vec3 base = palette(B * 1.2 + texture(uTex, uv).r * 0.25 + uTime * 0.008);
  vec3 col = base * (0.12 + 0.9 * diff) * mask
           + vec3(1.0, 0.98, 0.92) * spec * mask * 0.9
           + base * rim * 0.35 * mask
           + vec3(0.002, 0.003, 0.005);                // abyssal floor

  float v = length(uv - 0.5);
  col *= 1.0 - 0.4 * v * v;
  col = pow(1.0 - exp(-col * 1.6), vec3(0.4545));

  outColor = vec4(col, 1.0);
}
</script>

<script type="x-shader/vertex" id="vs">#version 300 es
in vec2 aPos;
void main() { gl_Position = vec4(aPos, 0.0, 1.0); }
</script>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { antialias: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;font-family:monospace;padding:2em">WebGL2 not available</p>'; throw new Error('no webgl2'); }
const canFloat = !!gl.getExtension('EXT_color_buffer_float');

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src.trim());
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
function program(fsId) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, document.getElementById('vs').textContent));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, document.getElementById(fsId).textContent));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(p));
  return p;
}
const simProg = program('sim-fs');
const showProg = program('show-fs');

const vao = gl.createVertexArray();
gl.bindVertexArray(vao);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

// sim runs at reduced resolution — pattern wavelength is fixed in texels,
// so this sets how fine the coral is relative to the screen
let W = 0, H = 0, SW = 0, SH = 0;
let targets = null, needReset = true;

function makeTarget(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  if (canFloat) gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  else gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  return { tex, fbo };
}

function resize() {
  const dpr = Math.min(devicePixelRatio || 1, 2);
  W = Math.floor(innerWidth * dpr);
  H = Math.floor(innerHeight * dpr);
  canvas.width = W; canvas.height = H;
  const scale = Math.min(1, 1400 / W) * 0.5;
  SW = Math.max(2, Math.floor(W * scale));
  SH = Math.max(2, Math.floor(H * scale));
  targets = [makeTarget(SW, SH), makeTarget(SW, SH)];
  needReset = true;
}
addEventListener('resize', resize);
resize();

const mouse = { x: -1e4, y: -1e4, on: 0 };
function point(x, y) {
  mouse.x = (x / innerWidth) * SW;
  mouse.y = (1 - y / innerHeight) * SH;
  mouse.on = 1;
}
addEventListener('mousemove', e => point(e.clientX, e.clientY));
addEventListener('mouseleave', () => { mouse.on = 0; });
addEventListener('touchmove', e => { point(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
addEventListener('touchend', () => { mouse.on = 0; });
addEventListener('keydown', e => { if (e.key === 'r' || e.key === 'R') needReset = true; });

const simU = ['uPrev', 'uRes', 'uTime', 'uMouse', 'uMouseOn', 'uReset']
  .reduce((o, k) => (o[k] = gl.getUniformLocation(simProg, k), o), {});
const showU = ['uTex', 'uRes', 'uSimRes', 'uTime']
  .reduce((o, k) => (o[k] = gl.getUniformLocation(showProg, k), o), {});

const STEPS = 18;
let read = 0;
let simT = 0, lastNow = 0;
const DT = 1 / 60;   // simulation runs on its own clock, one tick per frame

function step(dt) {
  simT += dt;
  gl.useProgram(simProg);
  gl.viewport(0, 0, SW, SH);
  gl.uniform2f(simU.uRes, SW, SH);
  gl.uniform1f(simU.uTime, simT);
  gl.uniform2f(simU.uMouse, mouse.x, mouse.y);
  gl.uniform1f(simU.uMouseOn, mouse.on);

  for (let i = 0; i < STEPS; i++) {
    gl.uniform1f(simU.uReset, needReset ? 1 : 0);
    needReset = false;
    gl.bindFramebuffer(gl.FRAMEBUFFER, targets[1 - read].fbo);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, targets[read].tex);
    gl.uniform1i(simU.uPrev, 0);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    read = 1 - read;
  }
}

function render() {
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, W, H);
  gl.useProgram(showProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, targets[read].tex);
  gl.uniform1i(showU.uTex, 0);
  gl.uniform2f(showU.uRes, W, H);
  gl.uniform2f(showU.uSimRes, SW, SH);
  gl.uniform1f(showU.uTime, simT);
  gl.drawArrays(gl.TRIANGLES, 0, 3);
}

// ?warp=N pre-runs N frames before first paint — headless capture
// can't fast-forward requestAnimationFrame, so the piece does it itself
const warp = Math.min(20000, parseInt(new URLSearchParams(location.search).get('warp'), 10) || 0);
for (let i = 0; i < warp; i++) step(DT);

function frame(now) {
  const dt = lastNow ? Math.min((now - lastNow) / 1000, 0.05) : DT;
  lastNow = now;
  step(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

if (window.self !== window.top) document.getElementById('hint').remove();
else setTimeout(() => { document.getElementById('hint').style.opacity = 0; }, 12000);
</script>
</body>
</html>
